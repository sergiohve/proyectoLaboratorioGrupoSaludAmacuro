<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      overflow: hidden;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 20px;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 36px;
    }

    .status {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 16px;
      min-height: 18px;
    }

    .dots {
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 11px;
      height: 11px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.75); opacity: 0.35; }
      40%            { transform: scale(1.2);  opacity: 1;    }
    }

    .version {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 11px;
      opacity: 0.45;
    }
  </style>
</head>
<body>
  <div class="icon">🧪</div>
  <h1>Sistema de Laboratorio</h1>
  <p class="subtitle">Gestión de exámenes clínicos</p>
  <p class="status" id="status">Iniciando servicios...</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <span class="version">v1.0.0</span>

  <script>
    const msgs = [
      'Iniciando base de datos...',
      'Conectando servicios...',
      'Cargando aplicación...',
    ];
    let i = 0;
    const el = document.getElementById('status');
    setInterval(() => { el.textContent = msgs[i++ % msgs.length]; }, 2000);
  </script>
</body>
</html>
